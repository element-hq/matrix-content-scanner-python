name: Linting and Tests
on:
  push:
    branches: ["main"]
  pull_request:

env:
  RUST_VERSION: 1.82.0

# Disable all permissions for the GITHUB_TOKEN access token by default.
permissions: {}

jobs:
  check-code-style:
    name: Check code style
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get install -y libmagic1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install ${{ env.RUST_VERSION }}

      - name: Setup Poetry
        uses: matrix-org/setup-python-poetry@a82e526ebef97ec2d5000e220beb07aaadfda595 # v1
        with:
          python-version: "3.13"
          install-project: "false"

      - name: Run ruff check
        run: poetry run ruff check --output-format=github .

      - name: Run ruff format
        run: poetry run ruff format --check .

  check-types:
    name: Check types with Mypy
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get install -y libmagic1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Setup Poetry
        uses: matrix-org/setup-python-poetry@a82e526ebef97ec2d5000e220beb07aaadfda595 # v1
        with:
          python-version: "3.13"
          # We have seen odd mypy failures that were resolved when we started
          # installing the project again:
          # https://github.com/matrix-org/synapse/pull/15376#issuecomment-1498983775
          # To make CI green, err towards caution and install the project.
          install-project: "true"

      # Cribbed from
      # https://github.com/AustinScola/mypy-cache-github-action/blob/85ea4f2972abed39b33bd02c36e341b28ca59213/src/restore.ts#L10-L17
      - name: Restore/persist mypy's cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .mypy_cache
          key: mypy-cache-${{ github.context.sha }}
          restore-keys: mypy-cache-

      - name: Run mypy
        run: poetry run mypy


  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Run the unit tests both against our oldest supported Python version
        # and the newest stable.
        python_version: [ "3.10", "3.13" ]
    steps:
      - run: sudo apt-get install -y libmagic1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install ${{ env.RUST_VERSION }}
      - uses: actions/setup-python@e9aba2c848f5ebd159c070c61ea2c4e2b122355e # v2
        with:
          python-version: ${{ matrix.python_version }}
      - run: python -m pip install tox "poetry==1.8.3"
      - run: tox -e py
